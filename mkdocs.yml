site_name: ILC In Lung Public Wiki
site_description: Source-aware research wiki on innate lymphoid cells in lung biology and pulmonary disease.
docs_dir: wiki

theme:
  name: material
  palette:
    - scheme: default
      primary: white
      accent: grey
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - toc:
      permalink: false
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
extra_css:
  - assets/stylesheets/notion.css
  - assets/stylesheets/mermaid.css

nav:
  - Home: index.md
  - Project:
      - ILC In Lung Project: projects/ILC_in_lung_project.md
  - Guide:
      - ILC In Lung: topics/ILC_in_lung.md
      - ILC Research Trend: digests/2026-04-20_ILC_research_trend_then_to_now.md
      - Lung ILC Core Evidence Synthesis: digests/2026-04-22_lung_ILC_core_evidence_synthesis.md
  - Entities:
      - ILC2: entities/ILC2.md
      - ILC3: entities/ILC3.md
  - Topics:
      - ILC2 Roles In Pulmonary Disease: topics/ILC2_roles_in_pulmonary_disease.md
      - ILC2 Functional Regulation Mechanisms: topics/ILC2_functional_regulation_mechanisms.md
      - ILC3 Roles In Pulmonary Disease: topics/ILC3_roles_in_pulmonary_disease.md
      - ILC3 Functional Regulation Mechanisms: topics/ILC3_functional_regulation_mechanisms.md
  - Digests:
      - ILC2 Working Model: digests/2026-04-20_ILC2_working_model.md
      - ILC3 Working Model: digests/2026-04-20_ILC3_working_model.md
      - ILC In Pulmonary Diseases: digests/2026-04-20_ILC_pulmonary_disease_roles.md
  - Sources:
      - Source Index: sources/source_index.md
  - Audit:
      - Topic And Entity Integration Audit: audit/2026-04-22_topic_entity_integration_audit.md
